<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三大券商買賣超 Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F4F5F7; color: #1A1A2E; }
.topbar { background: #1A252F; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-title { font-size: 20px; font-weight: 600; }
.topbar-meta { font-size: 14px; color: #8CA0B0; margin-top: 2px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.badge { font-size: 13px; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.12); color: #C8D8E8; }
.rbtn { font-size: 14px; padding: 6px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.25); background: transparent; color: #fff; cursor: pointer; }
.rbtn:hover { background: rgba(255,255,255,0.1); }
.wrap { max-width: 1600px; margin: 0 auto; padding: 20px 16px; }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab { padding: 8px 22px; font-size: 14px; font-weight: 500; border-radius: 6px; border: 1px solid #D0D8E0; background: #fff; color: #667788; cursor: pointer; }
.tab.active { background: #1A252F; color: #fff; border-color: #1A252F; }
.grid { display: grid; grid-template-columns: repeat(3,1fr) 0.85fr; gap: 12px; margin-bottom: 20px; }
.card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.ch { padding: 12px 14px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
.hm{background:#1A3A6B;} .hmo{background:#0D4F8B;} .hy{background:#B7300A;} .hco{background:#7B5500;}
.chn { font-size: 16px; font-weight: 600; }
.chs { font-size: 12px; opacity: 0.75; }
.sec { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; padding: 7px 12px 5px; border-bottom: 1px solid #EEF1F5; }
.sb{color:#C0392B;background:#FEF9F9;} .ss{color:#1A6B3C;background:#F4FBF7;}
.rr { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-bottom: 1px solid #F2F4F7; cursor: pointer; text-decoration: none; color: inherit; }
.rr:last-child { border-bottom: none; }
.rr:hover { background: #EEF4FF; }
.rr:hover .nm { color: #1A3A6B; text-decoration: underline; }
.rk { width: 20px; text-align: center; font-size: 12px; color: #9EAAB8; flex-shrink: 0; }
.cd { width: 46px; font-size: 12px; color: #556677; flex-shrink: 0; font-family: monospace; font-weight: 600; }
.nm { flex: 1; font-size: 13px; color: #2C3E50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pr { font-size: 12px; color: #C0392B; font-weight: 600; flex-shrink: 0; width: 54px; text-align: right; }
.vb { font-size: 13px; font-weight: 700; color: #C0392B; flex-shrink: 0; width: 82px; text-align: right; }
.vs { font-size: 13px; font-weight: 700; color: #1A6B3C; flex-shrink: 0; width: 82px; text-align: right; }
.dv { height: 1px; background: #EEF1F5; margin: 3px 0; }
.cr { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-bottom: 1px solid #F2F4F7; cursor: pointer; text-decoration: none; color: inherit; }
.cr:last-child { border-bottom: none; }
.cr:hover { background: #EEF4FF; }
.cr:hover .nm { color: #1A3A6B; text-decoration: underline; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.em { font-size: 13px; color: #B0BEC5; padding: 14px; text-align: center; }
.stitle { font-size: 16px; font-weight: 600; color: #1A252F; margin: 24px 0 10px; display: flex; align-items: center; gap: 8px; }
.stitle::before { content: ''; width: 4px; height: 18px; background: #C0392B; border-radius: 2px; }
.cgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.c2 { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #F2F4F7; cursor: pointer; text-decoration: none; color: inherit; }
.c2:last-child { border-bottom: none; }
.c2:hover { background: #EEF4FF; }
.c2:hover .cname { color: #1A3A6B; text-decoration: underline; }
.db { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: #FEF3F2; color: #C0392B; flex-shrink: 0; }
.cname { flex:1; font-size:14px; color:#2C3E50; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.loading { padding: 3rem; text-align: center; color: #9EAAB8; font-size: 15px; }
.sp { display: inline-block; width: 20px; height: 20px; border: 2px solid #E0E5EB; border-top-color: #667788; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.info { background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: 8px; padding: 14px 18px; font-size: 14px; color: #0C4A6E; line-height: 1.9; }
.hint { font-size: 11px; color: #9EAAB8; text-align: right; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">三大券商買賣超 Dashboard</div>
    <div class="topbar-meta">美林 · 摩根士丹利 · 元大｜點擊股票名稱→玩股網</div>
  </div>
  <div class="topbar-right">
    <span class="badge" id="dbadge">—</span>
    <button class="rbtn" onclick="loadAll()">↻ 重新整理</button>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="sw('1d',this)">近1日</button>
    <button class="tab" onclick="sw('5d',this)">近5日</button>
  </div>
  <div id="main"><div class="loading"><span class="sp"></span>載入資料中...</div></div>
  <div class="stitle">連續買進追蹤</div>
  <div id="consec"><div class="loading"><span class="sp"></span>分析歷史資料...</div></div>
</div>

<script>
const SID = '1tqGiLRbhFTojjLKi5rUeRu6UwnvBT2zHDDk490A4Tjc';
const BRS = [{name:'美林',hc:'hm'},{name:'摩根士丹利',hc:'hmo'},{name:'元大',hc:'hy'}];
let P = '1d', D = {}, NM = {};

function wantgooUrl(code) { return `https://www.wantgoo.com/stock/${code}`; }

async function gviz(sheet, query) {
  let url = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;
  if (query) url += `&tq=${encodeURIComponent(query)}`;
  const res = await fetch(url);
  const txt = await res.text();
  const m = txt.match(/setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('解析失敗 ' + sheet);
  const d = JSON.parse(m[1]);
  return { cols: d.table.cols, rows: d.table.rows || [] };
}

function code4(v) {
  if (v===null||v===undefined||v==='') return '';
  const s = String(v).trim().replace(/'/g,'');
  if (!s) return '';
  if (/[A-Za-z]/.test(s)) return s;  // 含英文字母如 00981A
  if (/^\d+$/.test(s)) return s.padStart(4,'0');  // 純數字補零到4位
  const n = parseInt(s);
  if (isNaN(n)||n<=0) return '';
  return String(n).padStart(4,'0');
}

function fmt(v) { return Math.round(Math.abs(parseFloat(v)||0)).toLocaleString(); }
function fmtPr(v) { const n=parseFloat(v); return(!isNaN(n)&&n>0)?n.toFixed(2):'—'; }
function getName(code) {
  if (NM[code]) return NM[code];
  // 嘗試不同格式
  const noLead = String(parseInt(code));
  if (NM[noLead]) return NM[noLead];
  return code;
}
function getv(cell) { return cell?cell.v:null; }

async function buildNameMap() {
  try {
    const data = await gviz('📊 總覽');
    // 代號/名稱欄位：美林(C=col2,D=col3) 摩根(J=col9,K=col10) 元大(Q=col16,R=col17)
    const pairs = [[2,3],[9,10],[16,17]];
    for (const row of data.rows) {
      const cells = row.c;
      if (!cells) continue;
      for (const [ci, ni] of pairs) {
        const c = cells[ci];
        const n = cells[ni];
        if (!c || !n) continue;
        const codeRaw = c.v != null ? String(c.v) : null;
        const nameRaw = n.v != null ? String(n.v) : null;
        if (!codeRaw || !nameRaw) continue;
        const code = codeRaw.replace(/'/g,'').trim();
        const name = nameRaw.trim();
        if (code && name && name !== '名稱' && name !== '代號' && name.length > 0) {
          NM[code] = name;
          // 同時存不含前導零版本
          const n2 = String(parseInt(code));
          if (n2 !== 'NaN' && n2 !== code) NM[n2] = name;
        }
      }
    }
    // 補充 00 開頭的 ETF 名稱
    const fixes = {
      '0050':'元大台灣50','0056':'元大高股息','00878':'國泰永續高股息',
      '00900':'富邦特選高股息30','00910':'第一金工業30','00915':'凱基優選高股息30',
      '00916':'國泰全球品牌50','00919':'群益台灣精選高息','00929':'復華台灣科技優息',
      '00934':'中信成長高股息','00939':'統一台灣高息動能','00940':'元大台灣價值高息',
      '00941':'台新臺灣IC設計動能','00944':'群益日本不動產','00945':'凱基金融股息',
      '00946':'元大台灣高息低波','00947':'台新北美科技','00948':'凱基金融股息',
      '00981A':'主動統一台股增長','00631L':'元大台灣50正2',
      '00632R':'元大台灣50反1','00633L':'富邦台灣加權正2',
    };
    Object.assign(NM, fixes);
    // 同時建立4碼版本的對照（00929→0929）
    Object.keys(fixes).forEach(k => {
      if (k.length === 5 && k.startsWith('0')) NM[k.slice(1)] = fixes[k];
      if (k.length === 6 && k.startsWith('00')) NM[k.slice(1)] = fixes[k];
    });
    console.log('名稱對照表建立完成:', Object.keys(NM).length, '筆');
  } catch(e) { console.warn('名稱載入失敗:',e); }
}


function parseBroker(data) {
  const r1d={buys:[],sells:[]}, r5d={buys:[],sells:[]};
  let sec=r1d, cnt=0;
  for (const row of data.rows) {
    const cells=row.c;
    const rank=parseFloat(getv(cells[0]));
    if (isNaN(rank)||rank<=0) { if(cnt>=5) sec=r5d; continue; }
    if (rank>10) continue;
    cnt++;
    const bCode=code4(getv(cells[1]));
    const bNet=parseFloat(getv(cells[4]))||0;
    const bPr=parseFloat(getv(cells[5]))||0;
    let sCode='';
    if (cells[8]) { const sv=getv(cells[8]); sCode=sv!==null?code4(sv):(cells[8].f?code4(cells[8].f):''); }
    const sNet=parseFloat(getv(cells[11]))||0;
    const sPr=parseFloat(getv(cells[12]))||0;
    if (bCode&&bNet>0) sec.buys.push({rank:Math.round(rank),code:bCode,net:bNet,price:bPr});
    if (sCode&&sNet>0) sec.sells.push({rank:Math.round(parseFloat(getv(cells[7]))||rank),code:sCode,net:sNet,price:sPr});
  }
  return {'1d':r1d,'5d':r5d};
}

function parseHistory(data) {
  const map={};
  for (let ri=1;ri<data.rows.length;ri++) {
    const cells=data.rows[ri].c;
    const date=String(getv(cells[0])||(cells[0]&&cells[0].f)||'').trim();
    if (!date||date==='日期') continue;
    for (let i=1;i<=10;i++) {
      const cell=cells[i];
      const txt=String(getv(cell)||(cell&&cell.f)||'').trim();
      if (!txt) continue;
      const m=txt.match(/(.+)\((\w+)\)\s*\+?([\d,]+)/);
      if (!m) continue;
      const name=m[1].trim(),code=m[2],qty=parseInt(m[3].replace(/,/g,''))||0;
      if (!map[code]) map[code]={name,code,dates:[],total:0};
      if (!map[code].dates.includes(date)) map[code].dates.push(date);
      map[code].total+=qty;
    }
  }
  return Object.values(map).filter(s=>s.dates.length>=2)
    .sort((a,b)=>b.dates.length-a.dates.length||b.total-a.total).slice(0,10);
}

async function loadAll() {
  D={}; NM={};
  document.getElementById('main').innerHTML='<div class="loading"><span class="sp"></span>載入中...</div>';
  document.getElementById('consec').innerHTML='<div class="loading"><span class="sp"></span>分析中...</div>';
  const targets=['美林','摩根士丹利','元大','美林_歷史','摩根士丹利_歷史','元大_歷史'];
  const [nmRes,...sheetRes]=await Promise.allSettled([buildNameMap(),...targets.map(t=>gviz(t))]);
  targets.forEach((n,i)=>{ if(sheetRes[i].status==='fulfilled') D[n]=sheetRes[i].value; });
  document.getElementById('dbadge').textContent=new Date().toLocaleDateString('zh-TW');
  render();
}

function render() {
  const bd={};
  BRS.forEach(b=>{ if(D[b.name]){const p=parseBroker(D[b.name]);bd[b.name]=p[P]||{buys:[],sells:[]};} else bd[b.name]={buys:[],sells:[]}; });
  const bcc={},scc={};
  BRS.forEach(b=>{ new Set(bd[b.name].buys.map(s=>s.code)).forEach(c=>bcc[c]=(bcc[c]||0)+1); new Set(bd[b.name].sells.map(s=>s.code)).forEach(c=>scc[c]=(scc[c]||0)+1); });
  const ref=bd[BRS[0].name];
  const cB=ref.buys.filter(s=>bcc[s.code]>=2);
  const cS=ref.sells.filter(s=>scc[s.code]>=2);
  const lbl=P==='1d'?'近1日':'近5日';

  const rr=(s,i,ib)=>`
    <a class="rr" href="${wantgooUrl(s.code)}" target="_blank">
      <span class="rk">${i+1}</span>
      <span class="cd">${s.code}</span>
      <span class="nm">${getName(s.code)}</span>
      <span class="pr">${fmtPr(s.price)}</span>
      <span class="${ib?'vb':'vs'}">${ib?'+':'-'}${fmt(s.net)}張</span>
    </a>`;

  const cr=(s,ib)=>`
    <a class="cr" href="${wantgooUrl(s.code)}" target="_blank">
      <span class="dot" style="background:${ib?'#C0392B':'#1A6B3C'};"></span>
      <span class="cd">${s.code}</span>
      <span class="nm">${getName(s.code)}</span>
      <span class="pr">${fmtPr(s.price)}</span>
      <span class="${ib?'vb':'vs'}">${ib?'+':'-'}${fmt(s.net)}張</span>
    </a>`;

  let h='<div class="hint">點擊股票列 → 開啟玩股網查詢</div><div class="grid">';
  BRS.forEach(b=>{
    const d=bd[b.name];
    h+=`<div class="card">
      <div class="ch ${b.hc}"><span class="chn">${b.name}</span><span class="chs">${lbl}</span></div>
      <div class="sec sb">▲ 買超前10</div>
      ${d.buys.slice(0,10).map((s,i)=>rr(s,i,true)).join('')||'<div class="em">無資料</div>'}
      <div class="dv"></div>
      <div class="sec ss">▼ 賣超前10</div>
      ${d.sells.slice(0,10).map((s,i)=>rr(s,i,false)).join('')||'<div class="em">無資料</div>'}
    </div>`;
  });
  h+=`<div class="card">
    <div class="ch hco"><span class="chn">共同上榜</span><span class="chs">兩家以上</span></div>
    <div class="sec sb">▲ 共同買超</div>
    ${cB.map(s=>cr(s,true)).join('')||'<div class="em">（無）</div>'}
    <div class="dv"></div>
    <div class="sec ss">▼ 共同賣超</div>
    ${cS.map(s=>cr(s,false)).join('')||'<div class="em">（無）</div>'}
  </div>`;
  h+='</div>';
  document.getElementById('main').innerHTML=h;

  let ch='<div class="cgrid">';
  let any=false;
  BRS.forEach(b=>{
    const key=b.name+'_歷史';
    const c=D[key]?parseHistory(D[key]):[];
    if(c.length) any=true;
    ch+=`<div class="card">
      <div class="ch ${b.hc}"><span class="chn">${b.name}</span><span class="chs">連續買進</span></div>
      ${c.map(s=>`
        <a class="c2" href="${wantgooUrl(s.code)}" target="_blank">
          <span class="db">${s.dates.length}天</span>
          <span class="cd">${s.code}</span>
          <span class="cname">${s.name||getName(s.code)}</span>
          <span style="font-size:13px;color:#9EAAB8;flex-shrink:0;">+${fmt(s.total)}張</span>
        </a>`).join('')
      ||'<div class="em" style="padding:1.5rem;">資料累積中<br><span style="font-size:12px;">至少需要2天資料</span></div>'}
    </div>`;
  });
  ch+='</div>';
  if(!any) ch='<div class="info">每天執行腳本後，連續2天以上出現在買超榜的股票會自動顯示在這裡。</div>';
  document.getElementById('consec').innerHTML=ch;
}

function sw(p,el){ P=p; document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); if(Object.keys(D).length) render(); }
loadAll();
</script>
</body>
</html>
